services:
  - type: web
    name: secure-auth-app
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: secure-auth-db
          property: connectionString

databases:
  - name: secure-auth-db
    databaseName: secureauth
    user: secureauth_user
    plan: free
